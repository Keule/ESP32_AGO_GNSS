; ============================================================================
; AgSteer – Autosteer-Steuergerät für AgOpenGPS / AgIO
; Plattform: LilyGO T-ETH-Lite-S3 (ESP32-S3-WROOM-1 + W5500 Ethernet)
;
; Aufbau:
;   src/        → ESP32 Firmware Entry Point (main.cpp)
;   lib/        → Plattformunabhängige Logik + HAL (logic/, hal/, hal_esp32/)
;   include/    → Projektweite Header (hardware_pins.h)
;   pc_sim/     → PC-Simulation (nicht von PlatformIO kompiliert)
;   test/       → Unit-Tests (optional, von PlatformIO kompiliert)
; ============================================================================

[env:esp32-s3-devkitc-1]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework = arduino

; --- Board-spezifische Optionen ---
; LilyGO T-ETH-Lite-S3: ESP32-S3-WROOM-1-N8R8 (16 MB Flash, 8 MB PSRAM)
board_build.mcu         = esp32s3
board_build.f_cpu       = 240000000L
board_build.flash_mode  = qio
board_build.flash_size  = 16MB
board_build.partitions  = default.csv

; --- PSRAM ---
board_build.psram_mode  = opi
build_flags             =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; lib/ im Include-Pfad, damit #include "hal/hal.h" und
    ; #include "logic/global_state.h" aus allen Dateien funktionieren
    -I lib

; --- Serieller Monitor ---
monitor_speed  = 115200
monitor_filters = direct

; --- Bibliotheken ---
lib_deps       =
    ; W5500 Ethernet für ESP32 (SPI-basiert)
    epigrammi/Ethernet3 @ ^1.0.0

; --- Compiler-Optionen ---
build_unflags  = -std=gnu++11
build_flags    =
    ${env:esp32-s3-devkitc-1.build_flags}
    -std=gnu++17

; --- Upload ---
upload_speed    = 921600
