; ============================================================================
; AgSteer – Autosteer-Steuergerät für AgOpenGPS / AgIO
; Plattform: LilyGO T-ETH-Lite-S3 (ESP32-S3-WROOM-1 + W5500 Ethernet)
;
; Aufbau:
;   src/        → Firmware-Quellcode (main.cpp, hal/, hal_esp32/, logic/)
;   include/    → Projektweite Header (hardware_pins.h)
;   pc_sim/     → PC-Simulation (nicht von PlatformIO kompiliert)
;
; PIO kompiliert alle .cpp Dateien unter src/ rekursiv.
; Include-Pfad: src/, include/ (automatisch von PlatformIO gesetzt)
; ============================================================================

[env:esp32-s3-devkitc-1]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework = arduino

; --- Board-spezifische Optionen ---
; LilyGO T-ETH-Lite-S3: ESP32-S3-WROOM-1-N8R8 (16 MB Flash, 8 MB PSRAM)
board_build.mcu         = esp32s3
board_build.f_cpu       = 240000000L
board_build.flash_mode  = qio
board_build.flash_size  = 16MB

; --- PSRAM ---
board_build.psram_mode  = opi

; --- Compiler-Optionen ---
; Verwende C++17 statt des Arduino-Standard (C++11)
build_unflags = -std=gnu++11
build_flags   =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; --- Serieller Monitor ---
monitor_speed  = 115200
monitor_filters = direct

; --- Bibliotheken ---
lib_deps       =
    ; W5500 Ethernet für ESP32 (SPI-basiert)
    sstaub/Ethernet3 @ ^1.6.0

; --- Upload ---
upload_speed    = 921600
